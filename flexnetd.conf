# /usr/local/etc/ax25/flexnetd.conf
# flexnetd — native FlexNet routing daemon

MyCall          IW2OHX-3
Alias           OHXGW
MinSSID         3
MaxSSID         3

Role            server

# ─── FlexNet ports ────────────────────────────────────────────────────
#
# Two equivalent syntaxes are supported:
#
# 1) Legacy single-port (what v0.3.0..v0.6.0 used):
#
#      Neighbor        IW2OHX-14
#      PortName        xnet
#      FlexListenCall  IW2OHX-3
#
# 2) New multi-port (v0.7.0+, M6):
#
#      Port <port_name> <neighbor_call> <listen_call>
#
#    Up to 4 Port entries.  All may share the same listen_call — the
#    kernel accepts it as long as each socket uses SO_BINDTODEVICE,
#    which flexnetd does automatically.
#
# flexnetd binds each listen_call directly on its port.  The pair
# [<listen_call> VIA <port_name>] must NOT be in ax25d.conf — flexnetd
# owns it.  On the peer, configure: ro flexnet add <port_name> <listen_call>
#
# Start with the legacy flat syntax (single port, xnet neighbor):
Neighbor        IW2OHX-14
PortName        xnet
FlexListenCall  IW2OHX-3

# To add a second port, either use the Port syntax above instead, or
# comment the three lines above and uncomment these:
#
# Port xnet  IW2OHX-14  IW2OHX-3
# Port pcf   IW2OHX-12  IW2OHX-3

PollInterval    240
KeepaliveInterval  90
BeaconInterval  120

GatewaysFile    /usr/local/var/lib/ax25/flex/gateways
DestFile        /usr/local/var/lib/ax25/flex/destinations
LinkStatsFile   /usr/local/var/lib/ax25/flex/linkstats
# Path cache for flexdest -r (CE type-6/7 replies)
PathsFile       /usr/local/var/lib/ax25/flex/paths

# M5.3: seconds between outbound type-6 path probes.
#    0 = disabled (RECOMMENDED for production against an xnet neighbor —
#                   xnet does NOT implement type-7 replies, so probing
#                   just adds traffic with no useful return)
#   60 = one probe per minute (use against a PC/FlexNet peer that does
#                                implement type-7 replies)
#   10 = fast debug mode (for testing against a type-7-capable peer)
# See PROTOCOL_SPEC.md §CE type-6/7 for details on peer compatibility.
PathProbeInterval  0

Infinity        60000
TriggerThreshold  50

LogLevel        4
Syslog          no
