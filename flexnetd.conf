# /usr/local/etc/ax25/flexnetd.conf
# flexnetd — native FlexNet routing daemon

MyCall          IW2OHX-3
Alias           OHXGW
MinSSID         3
MaxSSID         3

Neighbor        IW2OHX-14
PortName        xnet

# flexnetd binds the port's own callsign (IW2OHX-3) on xnet directly.
# This matches the ax1 interface address, so bind() works natively.
# [IW2OHX-3 VIA xnet] must NOT be in ax25d.conf — flexnetd owns it.
# flexnetd dispatches: CE/CF -> FlexNet handler, F0 -> uronode.
# Xnet config: ro flexnet add xnet IW2OHX-3
FlexListenCall  IW2OHX-3

Role            server

PollInterval    240
KeepaliveInterval  90
BeaconInterval  120

GatewaysFile    /usr/local/var/lib/ax25/flex/gateways
DestFile        /usr/local/var/lib/ax25/flex/destinations

Infinity        60000
TriggerThreshold  50

LogLevel        4
Syslog          no
