# /usr/local/etc/ax25/flexnetd.conf
# flexnetd v1.0 — native FlexNet routing daemon (production)
#
# This file is the production configuration shipped with v1.0.  It
# uses the multi-port syntax (v0.7.0+) with per-port overrides
# (v0.7.1+), matching the configuration running in live service on
# IW2OHX-3.
#
# Peer compatibility status at v1.0:
#   • (X)NET V1.39            — FULLY STABLE (Q=2 RTT=2 in peer L-table)
#   • PC/Flexnet 3.3g         — OPERATIONAL, fine-tuning still pending
#                                 (see "PC/Flexnet fine-tuning" section
#                                 of README.md — the lt_reply=320 window
#                                 keeps the link stable but pcf's RTT
#                                 field still displays a higher value
#                                 than the ideal 1 tick; investigation
#                                 continues.)

# ── Identity ──────────────────────────────────────────────────────────
MyCall          IW2OHX-3
Alias           OHXGW
MinSSID         3
MaxSSID         3

# ── Mode ──────────────────────────────────────────────────────────────
#   server = native CE/CF peering (recommended; requires Port line(s))
#   client = legacy D-command polling (compat only; no peering)
Role            server

# ── FlexNet ports ─────────────────────────────────────────────────────
#
# Syntax:
#   Port <port_name> <neighbor_call> <listen_call>  [options]
#
# Options (any order, space-separated; omit to use the global default):
#
#   route_advert=<sec>
#       Seconds between periodic re-advertisements of our own routes
#       to this peer.  Keeps our callsign fresh in the peer's
#       destination tables.
#         0  — disabled (recommended on both (X)NET and PC/Flexnet —
#              the initial exchange is enough; both peer populations
#              observed to misbehave on mid-session re-adverts)
#         N  — every N seconds
#
#   lt_reply=<sec>
#       Seconds between CE type-1 link-time frames we send to this
#       peer.  Controls peer's smoothed-RTT loop:
#         0  — reply on every peer event (matches linbpq-flexnet;
#              produces Q=2 RTT=2 on an (X)NET peer)
#         320 — 320-second cadence (matches PC/Flexnet 3.3g's
#              ts_ahead window; faster saturates pcf's 12-bit RTT)
#
#   advert_mode=<full|record>
#       How we advertise our own routes:
#         full   — `'3+' + record + '3-'` token exchange (required
#                  for (X)NET's sync cycle to complete; default)
#         record — compact record only, no token (required on
#                  PC/Flexnet ports — pcf DMs the L2 link on an
#                  unsolicited `'3+'` when its token state ≠ 0)
#
# Up to 4 Port entries are supported.  All may share the same
# listen_call — the kernel accepts this because flexnetd sets
# SO_BINDTODEVICE on every listen socket.  The [<listen_call> VIA
# <port_name>] pair MUST NOT appear in ax25d.conf.
#
# Production settings below match what has been validated against
# (X)NET V1.39 and PC/Flexnet 3.3g as of April 2026.

Port xnet  IW2OHX-14  IW2OHX-3  route_advert=0  lt_reply=0    advert_mode=full

# Uncomment to enable PC/Flexnet peering on the pcf port:
# Port pcf   IW2OHX-12  IW2OHX-3  route_advert=0  lt_reply=320  advert_mode=record

# ── Timers ────────────────────────────────────────────────────────────
PollInterval       240      # client-mode fallback: seconds between D polls
KeepaliveInterval   90      # base keepalive cadence (seconds)
BeaconInterval     120      # beacon interval (seconds)

# Seconds between outbound CE type-6 path probes.
#    0  = disabled (RECOMMENDED against (X)NET V1.39 — that version
#                   does not emit type-7 replies, so probing adds
#                   airtime with no return)
#   60  = one probe per minute (use against a type-7-capable peer)
#   10  = fast debug mode
PathProbeInterval  0

# Seconds between periodic re-advertisements of our own routes
# (global default; per-port `route_advert=` overrides this value).
#   0  = disabled (safe default for both peer families)
RouteAdvertInterval 0

# Seconds between CE type-1 link-time frames we send
# (global default; per-port `lt_reply=` overrides this value).
#   320 is the PC/Flexnet-safe default.  On (X)NET ports set
#   lt_reply=0 via the Port line for optimal convergence.
LinkTimeReplyInterval 320

# ── Output files (URONode / flexdest read these) ─────────────────────
GatewaysFile    /usr/local/var/lib/ax25/flex/gateways
DestFile        /usr/local/var/lib/ax25/flex/destinations
LinkStatsFile   /usr/local/var/lib/ax25/flex/linkstats
PathsFile       /usr/local/var/lib/ax25/flex/paths

# ── Protocol constants ───────────────────────────────────────────────
Infinity          60000
TriggerThreshold     50

# ── Logging ──────────────────────────────────────────────────────────
#   LogLevel: 1=error 2=warn 3=info 4=debug
LogLevel          3
Syslog            yes
