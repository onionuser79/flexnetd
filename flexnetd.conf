# /usr/local/etc/ax25/flexnetd.conf
# flexnetd — native FlexNet routing daemon

MyCall          IW2OHX-3
Alias           OHXGW
MinSSID         3
MaxSSID         3

Neighbor        IW2OHX-14
PortName        xnet

# flexnetd binds the port's own callsign directly.
# This matches the kernel AX.25 interface address, so bind() works natively.
# [<FlexListenCall> VIA <PortName>] must NOT be in ax25d.conf — flexnetd owns it.
# flexnetd dispatches: CE/CF -> FlexNet handler, F0 -> uronode.
# On the peer, configure: ro flexnet add <PortName> <FlexListenCall>
FlexListenCall  IW2OHX-3

Role            server

PollInterval    240
KeepaliveInterval  90
BeaconInterval  120

GatewaysFile    /usr/local/var/lib/ax25/flex/gateways
DestFile        /usr/local/var/lib/ax25/flex/destinations
LinkStatsFile   /usr/local/var/lib/ax25/flex/linkstats
# Path cache for flexdest -r (CE type-6/7 replies)
PathsFile       /usr/local/var/lib/ax25/flex/paths

# M5.3: seconds between outbound type-6 path probes.
#    0 = disabled (RECOMMENDED for production against an xnet neighbor —
#                   xnet does NOT implement type-7 replies, so probing
#                   just adds traffic with no useful return)
#   60 = one probe per minute (use against a PC/FlexNet peer that does
#                                implement type-7 replies)
#   10 = fast debug mode (for testing against a type-7-capable peer)
# See PROTOCOL_SPEC.md §CE type-6/7 for details on peer compatibility.
PathProbeInterval  0

Infinity        60000
TriggerThreshold  50

LogLevel        4
Syslog          no
