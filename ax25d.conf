# /usr/local/etc/ax25/ax25d.conf
#
# NOTE: [IW2OHX-3 VIA xnet] is intentionally ABSENT.
# flexnetd binds IW2OHX-3 (the xnet port callsign) directly and handles:
#   - FlexNet peering (pid=CE/CF) from IW2OHX-14
#   - User sessions (pid=F0) by exec-ing uronode
#
#parameters_extAX25 VC-wait-login VC-disc-on-linkfailure-msg VC-log-connections
#
[IW2OHX-7 VIA bpq]
NOCALL   * * * * * *  L
default  * * * * * *  -    root  /usr/local/sbin/uronode  uronode
#
[IW2OHX-7 VIA pcf]
NOCALL   * * * * * *  L
default  * * * * * *  -    root  /usr/local/sbin/uronode  uronode
#
[IQ2LB-6 via bpq]
NOCALL   * * * * * *  L
default  * * * * * *  - sysop /spider/src/client client %s ax25
#
[IQ2LB-6 via xnet]
NOCALL   * * * * * *  L
default  * * * * * *  - sysop /spider/src/client client %s ax25
#
[IQ2LB-6 via pcf]
NOCALL   * * * * * *  L
default  * * * * * *  - sysop /spider/src/client client %s ax25
#
# NETROM Port
<netrom>
NOCALL   * * * * * *  L
default  * * * * * *  -    root  /usr/local/sbin/uronode  uronode
#
